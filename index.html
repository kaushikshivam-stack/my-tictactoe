<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<ul>
<li>🎮 MyTicTacToe.com</li>
</ul>

<button id="theme">Dark Mode</button>

</nav>


   <div class="gameContainer">

<div class="container">

<div class="box bt-0 bl-0"><span class="boxtext"></span></div>
<div class="box bt-0"><span class="boxtext"></span></div>
<div class="box bt-0 br-0"><span class="boxtext"></span></div>

<div class="box bl-0"><span class="boxtext"></span></div>
<div class="box"><span class="boxtext"></span></div>
<div class="box br-0"><span class="boxtext"></span></div>

<div class="box bl-0 bb-0"><span class="boxtext"></span></div>
<div class="box bb-0"><span class="boxtext"></span></div>
<div class="box bb-0 br-0"><span class="boxtext"></span></div>

</div>

<div class="main-card">

    <div class="gameInfo">

<h1>Welcome to MyTicTacToe</h1>

<div>
<span class="info">Turn for X</span>
<button id="reset">Restart Match</button>
</div>

<h2>Game Mode</h2>

<select id="gameMode">
<option value="pvp">Player vs Player</option>
<option value="ai">Player vs Computer</option>
</select>

<h2>Players</h2>

<input type="text" id="playerX" placeholder="Player X Name">
<input type="text" id="playerO" placeholder="Player O Name">

<button id="setPlayers">Set Players</button>

<h2>Scoreboard</h2>

<p>
<span id="avatarXBoard">😎</span>
<span id="nameX">Player X</span>
Wins : <span id="scoreX">0</span>
</p>

<p>
<span id="avatarOBoard">🤖</span>
<span id="nameO">Player O</span>
Wins : <span id="scoreO">0</span>
</p>

<p>Draw : <span id="draw">0</span></p>


<h2>Match History</h2>

<ul id="historyList"></ul>

</div>

</div>

</div>

</div>

<footer>
<p>Made by Shivam K@ushik | 2026</p>
</footer>

<script src="script.js"></script>

</body>
</html>
